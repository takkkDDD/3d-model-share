<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>3D Model Gallery</title>
  <style>
    html, body { margin: 0; min-height: 100%; background: #1a1a1a; color: #eee;
      font-family: system-ui, sans-serif; }
    h1 { padding: 20px 16px 0; font-size: 18px; font-weight: 600; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; padding: 16px; }
    a.card { display: block; text-decoration: none; color: inherit; background: #262626;
      border-radius: 10px; overflow: hidden; border: 1px solid #333; }
    a.card model-viewer { width: 100%; height: 180px; --poster-color: #262626; pointer-events: none; }
    .label { padding: 8px 10px; font-size: 14px; }
    #empty { padding: 16px; opacity: .7; }
  </style>
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
</head>
<body>
  <h1>3D Model Gallery</h1>
  <div id="grid"></div>
  <div id="empty" style="display:none;">モデルがまだありません。</div>
  <script>
    fetch('models/manifest.json')
      .then(r => r.json())
      .then(list => {
        const grid = document.getElementById('grid');
        if (!list.length) {
          document.getElementById('empty').style.display = 'block';
          return;
        }
        list.forEach(item => {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = `index.html?model=${encodeURIComponent(item.file)}&title=${encodeURIComponent(item.title)}`;
          const mv = document.createElement('model-viewer');
          mv.src = `models/${item.file}`;
          mv.setAttribute('camera-controls', '');
          mv.setAttribute('auto-rotate', '');
          mv.setAttribute('environment-image', 'neutral');
          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = item.title + (item.added ? ` (${item.added})` : '');
          a.appendChild(mv);
          a.appendChild(label);
          grid.appendChild(a);
        });
      })
      .catch(() => {
        document.getElementById('empty').textContent = 'manifest.json を読み込めませんでした。';
        document.getElementById('empty').style.display = 'block';
      });
  </script>
</body>
</html>

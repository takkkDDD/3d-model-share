<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>3D Viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1a1a1a; color: #eee;
      font-family: system-ui, sans-serif; }
    model-viewer { width: 100%; height: 100%; --poster-color: #1a1a1a; }
    #title { position: fixed; top: 12px; left: 16px; font-size: 14px; opacity: .85;
      z-index: 10; background: rgba(0,0,0,.4); padding: 4px 10px; border-radius: 6px; }
    #err { position: fixed; inset: 0; display: none; align-items: center;
      justify-content: center; text-align: center; padding: 24px; }
  </style>
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>
</head>
<body>
  <div id="title"></div>
  <model-viewer id="mv"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1"
    exposure="0.75"
    environment-image="legacy"
    tone-mapping="aces"
    alt="3D model">
  </model-viewer>
  <div id="err">モデルを読み込めませんでした。URL の ?model= のファイル名(大文字小文字も一致)を確認してください。</div>
  <script>
    const q = new URLSearchParams(location.search);
    const model = q.get('model') || 'models/sample.glb';
    const src = model.includes('/') ? model : 'models/' + model;
    const mv = document.getElementById('mv');
    mv.src = src;
    const t = q.get('title');
    if (t) { document.getElementById('title').textContent = t; document.title = t; }
    mv.addEventListener('error', () => {
      document.getElementById('err').style.display = 'flex';
    });
  </script>
</body>
</html>
